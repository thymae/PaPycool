name: Unpack
on: push
permissions:
  contents: write
jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Installation
        run: |
          if [ -f LiveHub.zip ]; then
            unzip -o LiveHub.zip
            rm -rf LiveHub/.github
            rsync -a LiveHub/ .
            rm -rf LiveHub LiveHub.zip
            sed -i "s|thymae/PaPYcool|${GITHUB_REPOSITORY}|" app/src/main/java/com/livehub/app/MainActivity.java
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "Installation LiveHub"
            git push
          fi
      - name: Build APK
        run: gradle assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveHub-APK
          path: app/build/outputs/apk/debug/app-debug.apk
